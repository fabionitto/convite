{% extends "base.html" %}

{% block content %}
    <h2>{{ evento.titulo }}</h2>
    <p style="margin-top: 15px; margin-bottom: 25px; color: #555; line-height: 1.5;">
        {{ evento.descricao }}
    </p>
    
    <a href="{{ evento.maps_link }}" target="_blank" class="btn">Abrir no Google Maps</a>
    <a href="{{ url_for('convite', token=token) }}" class="btn btn-secondary">Voltar</a>
{% endblock %}
